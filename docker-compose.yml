version: "3.9"
services:
  app:
    image: "udeve/udyk:6.0.73" # 默认拉取最新版本
    privileged: true
    expose:
      - 8080
    ports:
      - "18080:8080" # 18080为对外暴露端口，可以根据需要进行修改，然后通过Nginx反向代理到此端口既可
    environment:
      - TZ="Asia/Shanghai"
    depends_on:
      - redis
      - db
    volumes:
      - "/var/lib/udyk/app:/app"
      - "/tmp:/tmp"

  redis:
    restart: "always"
    image: redis:4.0
    command: redis-server --bind 0.0.0.0
    environment:
      TZ: "Asia/Shanghai"
    volumes:
      - /var/lib/udyk/redis:/data
    expose:
      - 6379

  db:
    image: "mysql:8"
    expose:
      - 3306
    #ports:
    #  - "13306:3306"  若需通过数据库管理工具连接容器内的数据库，则打开此端口映射，并在工具中连接到13306端口进行管理，默认建议不开启
    volumes:
      - /var/lib/udyk/mysql:/var/lib/mysql
    environment:
      TZ: "Asia/Shanghai"
      MYSQL_ROOT_PASSWORD: "udyk@2023"
    restart: "always"