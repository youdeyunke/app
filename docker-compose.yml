version: "3.9"
services:
  app:
    container_name: udyk-app
    image: "udeve/udyk:6.0.181"     # 默认拉取最新版本
    privileged: true                # 注意，不能去掉
    restart: always
    expose:
      - 8080
    ports:
      - "18080:8080"                # 18080为对外暴露端口，可以根据需要进行修改，然后通过Nginx反向代理到此端口既可
    environment:
      TZ: "Asia/Shanghai"
      LANG: "C.UTF-8"
    depends_on:
      - redis
      - db
    volumes:
      - "/var/lib/udyk/app:/app"
      - "/tmp:/tmp"
        

  redis:
    container_name: udyk-redis
    restart: "always"
    image: redis:4.0
    command: redis-server --bind 0.0.0.0
    environment:
      TZ: "Asia/Shanghai"
      LANG: "C.UTF-8" 
    volumes:
      - /var/lib/udyk/redis:/data
    expose:
      - 6379

  db:
    container_name: udyk-db
    image: "mysql:8.0.3"
    expose:
      - 3306
    volumes:
      - /var/lib/udyk/mysql:/var/lib/mysql
    environment:
      LANG: "C.UTF-8" 
      TZ: "Asia/Shanghai"
      MYSQL_ROOT_PASSWORD: "udyk@2023"
    restart: "always"